<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Habit Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Notion Dark Mode Colors */
  --bg:      rgb(25, 25, 25);
  --card:    rgb(32, 32, 32);
  --card2:   rgb(37, 37, 37);
  --border:  rgba(255,255,255,0.094);
  --border2: rgba(255,255,255,0.05);
  --text:    rgba(255,255,255,0.81);
  --muted:   rgba(255,255,255,0.44);
  --muted2:  rgba(255,255,255,0.2);

  /* Notion Accent Colors */
  --de:      #529cca; /* Notion Blue */
  --de-glow: rgba(82,156,202,0.1);
  --en:      #9c8edb; /* Notion Purple */
  --en-glow: rgba(156,142,219,0.1);

  --ecoute:  #4dbab4; /* Notion Teal */
  --oral:    #d97757; /* Notion Orange */
  --ecrit:   #7dc570; /* Notion Green */
  --lecture: #cb8a65; /* Notion Brown */

  --done:    #7dc570;
  --done-dim:rgba(125,197,112,0.1);
  --miss-dim:rgba(212,74,74,0.08);
  --miss:    #d44a4a;
}

/* ── LIGHT MODE ── */
html.light {
  --bg:      rgb(247, 247, 245);
  --card:    rgb(255, 255, 255);
  --card2:   rgb(241, 241, 239);
  --border:  rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.05);
  --text:    rgba(0,0,0,0.82);
  --muted:   rgba(0,0,0,0.44);
  --muted2:  rgba(0,0,0,0.22);
  --done-dim:rgba(125,197,112,0.13);
  --miss-dim:rgba(212,74,74,0.07);
}

html, body {
  background: var(--bg);
  color: var(--text);
  /* Notion's exact system font stack */
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 350px;
  padding: 8px 10px 8px;
  gap: 7px;
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--card2); color: var(--text); }
.theme-toggle svg { display: block; }

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.page-date {
  font-size: 11px;
  color: var(--muted);
}

.title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--muted);
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px; /* Notion radius */
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}

.tab-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

.tab-btn.active-de {
  background: var(--de-glow);
  color: var(--de);
}
.tab-btn.active-en {
  background: var(--en-glow);
  color: var(--en);
}
.tab-btn.active-cal {
  background: rgba(125,197,112,0.08);
  color: var(--done);
}

.tab-pip {
  font-size: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  color: var(--muted);
  transition: all 0.15s;
}
.tab-btn.active-de .tab-pip { background: rgba(82,156,202,0.15); color: var(--de); }
.tab-btn.active-en .tab-pip { background: rgba(156,142,219,0.15); color: var(--en); }

/* ── PANELS ── */
.panel { display: none; flex-direction: column; gap: 7px; flex: 1; min-height: 0; }
.panel.visible { display: flex; }

/* ── LANG PANEL HEADER ── */
.lang-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  flex-shrink: 0;
}

.lang-left { display: flex; align-items: center; gap: 10px; }
.lang-flag { width: 20px; height: 20px; color: var(--text); display: flex; align-items: center; }
.lang-name { font-size: 14px; font-weight: 600; color: var(--text); }
.lang-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* Ring */
.ring-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 3; }
.ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.45s ease; }
.ring-txt  {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 11px; font-weight: 500; color: var(--text);
}

/* ── SKILL BUTTONS GRID ── */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  flex-shrink: 0;
}

.skill-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px 9px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.skill-btn:hover:not(.skill-done) {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.14);
}
.skill-btn.skill-done { 
  cursor: default; 
  background: var(--done-dim); 
  border-color: rgba(125,197,112,0.2); 
}

.skill-icon { 
  width: 20px; height: 20px; line-height: 1; 
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: color 0.2s;
}

.skill-streak {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 18px; font-weight: 500; line-height: 1;
  transition: color 0.2s;
}

.skill-label {
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.02em; text-transform: capitalize;
  color: var(--muted); line-height: 1;
}

/* Skill accent colors */
.skill-ecoute  .skill-streak { color: var(--ecoute); }
.skill-ecoute  .skill-icon   { color: var(--ecoute); }
.skill-oral    .skill-streak { color: var(--oral); }
.skill-oral    .skill-icon   { color: var(--oral); }
.skill-ecrit   .skill-streak { color: var(--ecrit); }
.skill-ecrit   .skill-icon   { color: var(--ecrit); }
.skill-lecture .skill-streak { color: var(--lecture); }
.skill-lecture .skill-icon   { color: var(--lecture); }

.skill-done .skill-streak { color: var(--done) !important; }
.skill-done .skill-icon   { color: var(--done) !important; }
.skill-done .skill-label  { color: rgba(125,197,112,0.6); }

/* Check dot */
.skill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: background 0.2s;
  flex-shrink: 0;
}
.skill-done .skill-dot { background: var(--done); }

/* ── MONTHLY STATS ── */
.month-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
}

.mstat {
  padding: 7px 4px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.mstat:last-child { border-right: none; }
.mstat-val {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 16px; font-weight: 500; line-height: 1; margin-bottom: 2px;
}
.mstat-lbl { font-size: 9px; color: var(--muted); text-transform: capitalize; letter-spacing: 0.02em; }

/* ── CALENDAR PANEL ── */
.cal-panel-inner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px 6px;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}

.cal-lang-tabs {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.cal-lang-btn {
  flex: 1;
  padding: 4px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.cal-lang-btn svg { width: 14px; height: 14px; }
.cal-lang-btn.active-de { background: var(--de-glow); color: var(--de); border-color: rgba(82,156,202,0.2); }
.cal-lang-btn.active-en { background: var(--en-glow); color: var(--en); border-color: rgba(156,142,219,0.2); }

.cal-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.cal-month-lbl { font-size: 12px; font-weight: 600; color: var(--text); text-transform: capitalize; }
.cal-nav { display: flex; gap: 2px; }
.cal-nav button {
  width: 22px; height: 22px;
  background: transparent; border: 1px solid transparent;
  border-radius: 4px; color: var(--muted); font-size: 14px;
  cursor: pointer; transition: all 0.13s;
  display: flex; align-items: center; justify-content: center;
}
.cal-nav button:hover { background: rgba(255,255,255,0.04); color: var(--text); }

.cal-weekdays {
  display: grid; grid-template-columns: repeat(7,1fr);
  flex-shrink: 0;
}
.cal-wd { text-align: center; font-size: 9px; font-weight: 500; color: var(--muted2); padding: 2px 0; }

.cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  grid-auto-rows: 26px;
  gap: 2px;
  flex-shrink: 0;
}

.cal-day {
  border-radius: 3px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 8px; color: var(--muted2);
  gap: 1px;
  height: 26px;
  overflow: hidden;
}

.cal-day.is-today  { border: 1px solid rgba(255,255,255,0.14); color: var(--text); background: rgba(255,255,255,0.04); }
.cal-day.is-future { color: rgba(255,255,255,0.1); }
.cal-day.day-full    { background: rgba(125,197,112,0.12); }
.cal-day.day-partial { background: rgba(255,255,255,0.04); }
.cal-day.day-miss    { background: var(--miss-dim); }
.cal-day.day-miss .dnum { color: var(--miss); opacity: 0.6; }

.dnum { font-size: 9px; line-height: 1; }
.ddots { display: flex; gap: 1px; flex-wrap: wrap; justify-content: center; max-width: 16px; }
.ddot  { width: 3px; height: 3px; border-radius: 50%; }

.cal-legend {
  display: flex; gap: 8px; flex-wrap: wrap;
  flex-shrink: 0;
  padding-top: 5px;
  border-top: 1px solid var(--border);
}
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); }
.leg-dot  { width: 6px; height: 6px; border-radius: 50%; }

/* ── CONFETTI ── */
#confettiCanvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  width: 100%; height: 100%;
}
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<!-- Top bar -->
<div class="top-bar">
  <div class="title">Language Tracker</div>
  <div class="page-date" id="pageDate"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active-de" id="tab-de" onclick="switchTab('de')">
    🇩🇪 DE <span class="tab-pip" id="pip-de">0/4</span>
  </button>
  <button class="tab-btn" id="tab-en" onclick="switchTab('en')">
    🇬🇧 EN <span class="tab-pip" id="pip-en">0/4</span>
  </button>
  <button class="tab-btn" id="tab-cal" onclick="switchTab('cal')">
    📅 Calendrier
  </button>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Changer de thème">
    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</div>

<!-- Panels container -->
<div id="panels" style="display:contents"></div>

<script>
// ── NOTION STYLE ICONS (SVG) ────────────────────────────
const ICONS = {
  globeDE: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
  globeEN: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
  headphones: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>`,
  mic: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>`,
  pen: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`,
  book: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`,
  calendar: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`
};

// ── CONFIG ──────────────────────────────────────────────
const LANGS = [
  { id:'de', flag: ICONS.globeDE, name:'Allemand', sub:'Deutsch · B1 Target', color:'#529cca' },
  { id:'en', flag: ICONS.globeEN, name:'Anglais',  sub:'English · Maintien',  color:'#9c8edb' }
];

const SKILLS = [
  { id:'ecoute',  label:'Écoute',  icon: ICONS.headphones, color:'#4dbab4' },
  { id:'oral',    label:'Oral',    icon: ICONS.mic,        color:'#d97757' },
  { id:'ecrit',   label:'Écrit',   icon: ICONS.pen,        color:'#7dc570' },
  { id:'lecture', label:'Lecture', icon: ICONS.book,       color:'#cb8a65' }
];

const KEY = 'langHabit_v4';

// ── STATE ───────────────────────────────────────────────
function mkState() {
  const c={}, b={};
  LANGS.forEach(l=>{ c[l.id]={}; b[l.id]={};
    SKILLS.forEach(s=>{ c[l.id][s.id]={}; b[l.id][s.id]=0; }); });
  return {checkins:c, best:b};
}

function loadState() {
  const fresh = mkState();
  try {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if (!saved) return fresh;
    // Merge saved checkins into fresh structure (preserves all dates)
    LANGS.forEach(l => {
      SKILLS.forEach(s => {
        if (saved.checkins?.[l.id]?.[s.id]) {
          fresh.checkins[l.id][s.id] = saved.checkins[l.id][s.id];
        }
        if (saved.best?.[l.id]?.[s.id] != null) {
          fresh.best[l.id][s.id] = saved.best[l.id][s.id];
        }
      });
    });
    return fresh;
  } catch {
    return fresh;
  }
}

let state = loadState();
let activeTab = 'de';
let calLang = 'de';
const calMonth = {};
LANGS.forEach(l => { calMonth[l.id] = new Date(); });

// ── UTILS ───────────────────────────────────────────────
function toKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const todayKey = () => toKey(new Date());

function streak(lid, sid) {
  const map = state.checkins[lid][sid];
  const today = new Date();
  let s = 0;
  const start = map[toKey(today)] ? today : new Date(today - 86400000);
  for (let i=0; i<3650; i++) {
    const d = new Date(start - i*86400000);
    if (map[toKey(d)]) s++; else break;
  }
  return s;
}

function doneToday(lid) {
  const k = todayKey();
  return SKILLS.filter(s => state.checkins[lid][s.id][k]).length;
}

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

// ── SWITCH TAB ──────────────────────────────────────────
function switchTab(id) {
  activeTab = id;
  ['de','en','cal'].forEach(t => {
    const tab = document.getElementById(`tab-${t}`);
    const panel = document.getElementById(`panel-${t}`);
    const isActive = t === id;
    if (panel) panel.classList.toggle('visible', isActive);
    tab.className = isActive ? `tab-btn active-${t}` : 'tab-btn';
  });
}

// ── CHECK-IN ────────────────────────────────────────────
function checkIn(lid, sid) {
  const k = todayKey();
  if (state.checkins[lid][sid][k]) return;
  state.checkins[lid][sid][k] = Date.now();
  const s = streak(lid, sid);
  if (s > (state.best[lid][sid]||0)) state.best[lid][sid] = s;
  save();
  renderAll();
  launchConfetti(SKILLS.find(x=>x.id===sid).color);
}

// ── BUILD PANELS ────────────────────────────────────────
function buildPanels() {
  const container = document.getElementById('panels');

  // Lang panels
  LANGS.forEach(lang => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (lang.id==='de' ? ' visible' : '');
    panel.id = `panel-${lang.id}`;

    panel.innerHTML = `
      <!-- Header -->
      <div class="lang-header">
        <div class="lang-left">
          <div class="lang-flag">${lang.flag}</div>
          <div>
            <div class="lang-name">${lang.name}</div>
            <div class="lang-sub">${lang.sub}</div>
          </div>
        </div>
        <div class="ring-wrap">
          <svg width="42" height="42" viewBox="0 0 42 42">
            <circle class="ring-bg" cx="21" cy="21" r="17"/>
            <circle class="ring-fill" id="ring-${lang.id}" cx="21" cy="21" r="17"
              stroke="${lang.color}" stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
          </svg>
          <div class="ring-txt" id="ring-txt-${lang.id}">0/4</div>
        </div>
      </div>

      <!-- Skill buttons -->
      <div class="skills-grid">
        ${SKILLS.map(s=>`
          <div class="skill-btn skill-${s.id}" id="btn-${lang.id}-${s.id}"
               onclick="checkIn('${lang.id}','${s.id}')">
            <div class="skill-dot" id="dot-${lang.id}-${s.id}"></div>
            <div class="skill-icon">${s.icon}</div>
            <div class="skill-streak" id="str-${lang.id}-${s.id}">0</div>
            <div class="skill-label">${s.label}</div>
          </div>
        `).join('')}
      </div>

      <!-- Monthly stats -->
      <div class="month-stats">
        ${SKILLS.map(s=>`
          <div class="mstat">
            <div class="mstat-val" id="mv-${lang.id}-${s.id}" style="color:${s.color}">0</div>
            <div class="mstat-lbl">${s.label.slice(0,3)}</div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(panel);
  });

  // Calendar panel
  const calPanel = document.createElement('div');
  calPanel.className = 'panel';
  calPanel.id = 'panel-cal';
  calPanel.innerHTML = `
    <div class="cal-panel-inner">
      <div class="cal-lang-tabs">
        ${LANGS.map(l=>`
          <button class="cal-lang-btn ${l.id==='de'?'active-de':''}" id="callang-${l.id}"
                  onclick="switchCalLang('${l.id}')">
            ${l.flag} ${l.name}
          </button>
        `).join('')}
      </div>
      <div class="cal-nav-row">
        <div class="cal-month-lbl" id="cal-lbl"></div>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-weekdays">
        ${['L','M','M','J','V','S','D'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        ${SKILLS.map(s=>`
          <div class="leg-item">
            <div class="leg-dot" style="background:${s.color}"></div>${s.label}
          </div>`).join('')}
        <div class="leg-item">
          <div class="leg-dot" style="background:var(--miss);opacity:0.45"></div>Manqué
        </div>
      </div>
    </div>
  `;
  container.appendChild(calPanel);

  // Update Main Tabs with SVGs
  document.getElementById('tab-de').innerHTML = `${ICONS.globeDE} DE <span class="tab-pip" id="pip-de">0/4</span>`;
  document.getElementById('tab-en').innerHTML = `${ICONS.globeEN} EN <span class="tab-pip" id="pip-en">0/4</span>`;
  document.getElementById('tab-cal').innerHTML = `${ICONS.calendar} Calendrier`;
}

// ── RENDER ALL ──────────────────────────────────────────
function renderAll() {
  document.getElementById('pageDate').textContent =
    new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});

  const todayK = todayKey();
  const today  = new Date();

  LANGS.forEach(lang => {
    const done = doneToday(lang.id);

    // Tab pip
    document.getElementById(`pip-${lang.id}`).textContent = `${done}/4`;

    // Ring
    const circ = 2 * Math.PI * 17;
    document.getElementById(`ring-${lang.id}`).style.strokeDashoffset = circ*(1-done/4);
    document.getElementById(`ring-txt-${lang.id}`).textContent = `${done}/4`;

    // Skills
    SKILLS.forEach(s => {
      const isDone = !!state.checkins[lang.id][s.id][todayK];
      const str    = streak(lang.id, s.id);
      const btn    = document.getElementById(`btn-${lang.id}-${s.id}`);

      btn.classList.toggle('skill-done', isDone);
      document.getElementById(`str-${lang.id}-${s.id}`).textContent = str;

      // Monthly count
      const vm = calMonth[lang.id];
      const y=vm.getFullYear(), m=vm.getMonth();
      const isCur = today.getFullYear()===y && today.getMonth()===m;
      const last  = isCur ? today.getDate() : new Date(y,m+1,0).getDate();
      let total=0;
      for(let d=1;d<=last;d++){
        const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(state.checkins[lang.id][s.id][k]) total++;
      }
      document.getElementById(`mv-${lang.id}-${s.id}`).textContent = total;
    });
  });

  renderCalendar();
}

// ── CALENDAR ────────────────────────────────────────────
function switchCalLang(lid) {
  calLang = lid;
  LANGS.forEach(l => {
    document.getElementById(`callang-${l.id}`).className =
      `cal-lang-btn${l.id===lid ? ' active-'+lid : ''}`;
  });
  renderCalendar();
}

function changeMonth(dir) {
  const vm = calMonth[calLang];
  calMonth[calLang] = new Date(vm.getFullYear(), vm.getMonth()+dir, 1);
  renderAll();
}

function renderCalendar() {
  const today = new Date();
  const vm = calMonth[calLang];
  const y=vm.getFullYear(), m=vm.getMonth();

  const lbl = document.getElementById('cal-lbl');
  if (!lbl) return;
  lbl.textContent = new Date(y,m).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  const firstDow = new Date(y,m,1).getDay();
  const offset   = firstDow===0 ? 6 : firstDow-1;
  const days     = new Date(y,m+1,0).getDate();
  const isCur    = today.getFullYear()===y && today.getMonth()===m;

  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  for(let i=0;i<offset;i++){
    const el=document.createElement('div'); el.className='cal-day'; grid.appendChild(el);
  }

  for(let d=1;d<=days;d++){
    const el = document.createElement('div'); el.className='cal-day';
    const date = new Date(y,m,d);
    const key  = toKey(date);
    const isToday  = isCur && today.getDate()===d;
    const isFuture = date>today && !isToday;

    if(isToday)  el.classList.add('is-today');
    if(isFuture) el.classList.add('is-future');

    const mask  = SKILLS.map(s=>!!state.checkins[calLang][s.id][key]);
    const count = mask.filter(Boolean).length;

    if(!isFuture){
      if(count===4)     el.classList.add('day-full');
      else if(count>0)  el.classList.add('day-partial');
      else if(!isToday) el.classList.add('day-miss');
    }

    const num=document.createElement('div'); num.className='dnum'; num.textContent=d; el.appendChild(num);

    if(!isFuture && count>0){
      const dots=document.createElement('div'); dots.className='ddots';
      SKILLS.forEach((s,i)=>{
        if(mask[i]){
          const dot=document.createElement('div'); dot.className='ddot';
          dot.style.background=s.color; dots.appendChild(dot);
        }
      });
      el.appendChild(dots);
    }
    grid.appendChild(el);
  }
}

// ── CONFETTI ────────────────────────────────────────────
let confAnim=null;
function launchConfetti(accent) {
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pal=[accent,'#ffffff','#7dc570','#f9e74e','#d44a4a'];
  const pts=Array.from({length:60},()=>({
    x:Math.random()*canvas.width, y:-10-Math.random()*60,
    r:3+Math.random()*4, d:Math.random()*60+20,
    color:pal[Math.floor(Math.random()*pal.length)],
    ta:Math.random()*Math.PI*2, ts:0.04+Math.random()*0.08,
    sp:1.5+Math.random()*2, op:1
  }));
  if(confAnim) cancelAnimationFrame(confAnim);
  let f=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); f++;
    let alive=0;
    pts.forEach(p=>{
      if(p.op<=0) return; alive++;
      p.ta+=p.ts; p.y+=p.sp; p.x+=Math.sin(f*0.015+p.d)*0.9;
      if(p.y>canvas.height*0.65) p.op-=0.02;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.op); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.r,p.r*0.45,p.ta,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    if(alive>0) confAnim=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── THEME ────────────────────────────────────────────────
const MOON_SVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
const SUN_SVG  = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;

let isDark = localStorage.getItem('langHabit_theme') !== 'light';

function applyTheme() {
  document.documentElement.classList.toggle('light', !isDark);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.innerHTML = isDark ? MOON_SVG : SUN_SVG;
}

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('langHabit_theme', isDark ? 'dark' : 'light');
  applyTheme();
}

applyTheme();

// ── INIT ────────────────────────────────────────────────
buildPanels();
applyTheme(); // re-apply after buildPanels to ensure icon is set
renderAll();
</script>
